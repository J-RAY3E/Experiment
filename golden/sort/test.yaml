in_source: |
  .org 0
  ADDI s0, zero, 300
  ADDI s1, zero, 0
  ADDI s5, zero, 0
  ADDI s6, zero, 0

  read_nums:
  LW   t0, zero, 0xFFF0
  BEQZ t0, store_last
  ADDI t1, zero, 32
  BEQ  t0, t1, got_sep
  ADDI t1, zero, 10
  BEQ  t0, t1, got_sep
  ADDI t2, zero, 10
  MUL  s5, s5, t2
  ADDI t0, t0, -48
  ADD  s5, s5, t0
  ADDI s6, zero, 1
  J read_nums

  got_sep:
  BEQZ s6, read_nums
  ADDI t3, s0, 1
  ADD  t4, t3, s1
  SW   s5, t4, 0
  ADDI s1, s1, 1
  ADDI s5, zero, 0
  ADDI s6, zero, 0
  J read_nums

  store_last:
  BEQZ s6, sort_start
  ADDI t3, s0, 1
  ADD  t4, t3, s1
  SW   s5, t4, 0
  ADDI s1, s1, 1

  sort_start:
  SW   s1, s0, 0

  ADDI s2, zero, 0
  outer:
  ADDI t0, s1, -1
  BGE  s2, t0, print_arr
  ADDI s3, zero, 0
  SUB  s4, t0, s2
  inner:
  BGE  s3, s4, next_i
  ADDI t0, s0, 1
  ADD  t1, t0, s3
  LW   t2, t1, 0
  LW   t3, t1, 1
  BLE  t2, t3, no_swap
  SW   t3, t1, 0
  SW   t2, t1, 1
  no_swap:
  ADDI s3, s3, 1
  J inner
  next_i:
  ADDI s2, s2, 1
  J outer

  print_arr:
  ADDI s2, zero, 0
  print_loop:
  BGE  s2, s1, finish
  ADDI t0, s0, 1
  ADD  t1, t0, s2
  LW   s5, t1, 0

  ADDI s6, zero, 1
  MV   s7, s5
  find_div:
  ADDI t0, zero, 10
  BGE  s6, s7, print_digits
  MUL  s6, s6, t0
  J find_div

  print_digits:
  ADDI t0, zero, 10
  DIV  s6, s6, t0
  BEQZ s6, zero_case
  digit_loop:
  BEQZ s6, next_num
  DIV  t0, s5, s6
  ADDI t1, t0, 48
  SW   t1, zero, 0xFFF4
  MUL  t2, t0, s6
  SUB  s5, s5, t2
  ADDI t0, zero, 10
  DIV  s6, s6, t0
  J digit_loop

  zero_case:
  ADDI t0, zero, 48
  SW   t0, zero, 0xFFF4

  next_num:
  ADDI t0, s2, 1
  BGE  t0, s1, no_space
  ADDI t0, zero, 32
  SW   t0, zero, 0xFFF4
  no_space:
  ADDI s2, s2, 1
  J print_loop

  finish:
  ADDI t0, zero, 10
  SW   t0, zero, 0xFFF4
  HALT

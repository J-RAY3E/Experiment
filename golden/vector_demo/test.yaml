in_source: |
  .org 0
  ADDI s0, zero, 200
  ADDI s1, zero, 204
  ADDI s2, zero, 208
  VLD  V0, [s0+0]
  VLD  V1, [s1+0]
  VADD V2, V0, V1
  VST  V2, [s2+0]
  ADDI s3, zero, 0
  print_vec:
  ADDI t0, zero, 4
  BGE  s3, t0, done
  ADD  t1, s2, s3
  LW   t2, t1, 0
  ADDI t3, zero, 10
  DIV  t4, t2, t3
  REM  t5, t2, t3
  ADDI t4, t4, 48
  SW   t4, zero, 0xFFF4
  ADDI t5, t5, 48
  SW   t5, zero, 0xFFF4
  ADDI t0, zero, 32
  SW   t0, zero, 0xFFF4
  ADDI s3, s3, 1
  J print_vec

  done:
  ADDI t0, zero, 10
  SW   t0, zero, 0xFFF4
  HALT

  .org 200
  .word 10
  .word 20
  .word 30
  .word 40
  .org 204
  .word 1
  .word 2
  .word 3
  .word 4
  .org 208
  .word 0
  .word 0
  .word 0
  .word 0

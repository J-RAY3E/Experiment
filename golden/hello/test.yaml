in_source: |
  .org 0
  ADDI s0, zero, 100
  LW   s1, s0, 0
  ADDI s2, zero, 0
  print_loop:
  BGE  s2, s1, done
  ADDI t0, s0, 1
  ADD  t1, t0, s2
  LW   t2, t1, 0
  SW   t2, zero, 0xFFF4
  ADDI s2, s2, 1
  J print_loop
  done:
  HALT

  .org 100
  .string "Hello, World!\n"

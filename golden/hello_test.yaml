max_ticks: 6000
src: hello.alg
alg_src: |
  function main() {
      print_str("Hello, World!\n");
      halt;
  }
asm_src: |
      .data 0
      data_start:
      .string "Hello, World!\n"
      .text 0
      J main
      main:
      ADDI gp, zero, data_start
      LUI t4, 0
      ADDI t4, t4, -12
      ADDI t0, gp, 0
      LW t1, t0, 0
      ADDI t0, t0, 4
      ADDI t2, zero, 0
      ps_1:
      BGE t2, t1, pe_2
      SLLI t3, t2, 2
      ADD t3, t0, t3
      LW t3, t3, 0
      SW t3, t4, 0
      ADDI t2, t2, 1
      J ps_1
      pe_2:
      HALT
in_stdin: "\r\n"
out_stdout: "Hello, World!\n"

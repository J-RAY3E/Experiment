in_source: |
  .org 0
  LUI s0, 0
  ADDI s0, s0, 200
  LW  s1, s0, 0
  ADDI s2, zero, 0
  print_prompt:
  BGE s2, s1, read_name
  ADDI t0, s0, 1
  ADD  t1, t0, s2
  LW   t2, t1, 0
  SW   t2, zero, 0xFFF4
  ADDI s2, s2, 1
  J print_prompt

  read_name:
  ADDI s3, zero, 240
  ADDI s4, zero, 0
  read_loop:
  LW   t0, zero, 0xFFF0
  BEQZ t0, print_hello
  ADDI t1, zero, 10
  BEQ  t0, t1, print_hello
  ADDI t2, s3, 1
  ADD  t3, t2, s4
  SW   t0, t3, 0
  ADDI s4, s4, 1
  J read_loop

  print_hello:
  SW   s4, s3, 0

  ADDI s0, zero, 220
  LW   s1, s0, 0
  ADDI s2, zero, 0
  print_hello_str:
  BGE  s2, s1, print_name_chars
  ADDI t0, s0, 1
  ADD  t1, t0, s2
  LW   t2, t1, 0
  SW   t2, zero, 0xFFF4
  ADDI s2, s2, 1
  J print_hello_str

  print_name_chars:
  ADDI s2, zero, 0
  print_name_loop:
  BGE  s2, s4, print_end
  ADDI t0, s3, 1
  ADD  t1, t0, s2
  LW   t2, t1, 0
  SW   t2, zero, 0xFFF4
  ADDI s2, s2, 1
  J print_name_loop

  print_end:
  ADDI t0, zero, 33
  SW   t0, zero, 0xFFF4
  ADDI t0, zero, 10
  SW   t0, zero, 0xFFF4
  HALT

  .org 200
  .string "What is your name?\n"

  .org 220
  .string "Hello, "
